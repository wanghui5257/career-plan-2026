spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  sql:
    init:
      mode: never  # 禁用 SQL 初始化脚本，使用 @BeforeEach 创建测试数据
  jpa:
    hibernate:
      ddl-auto: create-drop  # 根据实体类自动创建表结构
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_new_id_generator_mappings: false
        dialect: org.hibernate.dialect.H2Dialect
        storage_engine: memory

jwt:
  # JWT secret 必须至少 256 bits（32 字符）用于 HS256 算法
  secret: testSecretKeyForUnitTesting12345678901234567890
  expiration: 3600000
